name: ci
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke
        run: |
          echo "CI baseline OK"
          test -f README.md
          test -f tasks/STATUS.md
          test -f tasks/00-scaffold.md
      - name: Make test
        run: make test
