name: ci
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Smoke
        run: |
          echo "CI baseline OK"
          test -f README.md
          test -f tasks/STATUS.md
          test -f tasks/00-scaffold.md

      - name: Make test
        # Note: real macFUSE mount acceptance tests are opt-in and require macFUSE.
        # GitHub-hosted macOS runners cannot reliably install/enable macFUSE, so CI runs unit-style tests only.
        env:
          OCPROTECTFS_RUN_REAL_MOUNT_TESTS: "0"
        run: make test

      - name: Swift (supervisor-swift tests; fusefs-swift build is opt-in)
        if: matrix.os == 'macos-latest'
        run: |
          swift --version

          # fusefs-swift depends on macFUSE headers (fuse/fuse.h). GitHub-hosted runners
          # cannot reliably install/enable them, so keep this compile step opt-in.
          if [ "${OCPROTECTFS_CI_BUILD_FUSEFS_SWIFT:-0}" = "1" ]; then
            echo "OCPROTECTFS_CI_BUILD_FUSEFS_SWIFT=1; building fusefs-swift"
            (cd fusefs-swift && swift build)
          else
            echo "Skipping fusefs-swift build in CI (set OCPROTECTFS_CI_BUILD_FUSEFS_SWIFT=1 to enable)"
          fi

          cd supervisor-swift && swift test

  # Branch protection expects a status check called exactly "basic".
  # Use a tiny gate job that depends on the full test matrix.
  basic:
    name: basic
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "basic gate OK"
